<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>

  <script>
    (function () {
      try {
        const saved = localStorage.getItem("ea-theme");
        if (saved) {
          document.documentElement.dataset.theme = saved;
        }
      } catch (e) {}
    })();
  </script>
