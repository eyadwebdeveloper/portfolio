<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />

    <script>
      (function () {
        try {
          const saved = localStorage.getItem("ea-theme");
          if (saved) {
            document.documentElement.dataset.theme = saved;
          }
        } catch (e) {}
      })();
    </script>

      sizes="180x180"

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
